<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0" />
    <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
    <title>黎됧뀥 - 黎됧춻 Wordle</title>
    <meta name="description" content="黎됧뀥 - 黎됧춻 Wordle" />
    <meta property="og:image" content="https://paidou.pai.mn/og.png" />
    <meta property="og:title" content="黎됧뀥" />
    <meta property="og:description" content="黎됧뀥 - 黎됧춻 Wordle" />
    <meta name="twitter:image" content="https://paidou.pai.mn/og.png" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:creator" content="antfu7" />
  </head>
  <body>
    <div id="app"></div>
    <script>
      ;(function () {
        const prefersDark = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches
        const setting = localStorage.getItem('color-schema') || 'auto'
        if (setting === 'dark' || (prefersDark && setting !== 'light'))
          document.documentElement.classList.toggle('dark', true)
      })()
    </script>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
