<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0" />
    <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
    <title>派兜 - 原神汉字 Wordle</title>
    <meta name="description" content="A Genshin Impact Chinese Hanzi variation of Wordle - 派兜" />
    <meta property="og:title" content="派兜" />
    <meta property="og:description" content="A Genshin Impact Chinese Hanzi variation of Wordle - 派兜" />
  </head>
  <body>
    <div id="app"></div>
    <script>
      ;(function () {
        const prefersDark = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches
        const setting = localStorage.getItem('color-schema') || 'auto'
        if (setting === 'dark' || (prefersDark && setting !== 'light'))
          document.documentElement.classList.toggle('dark', true)
      })()
    </script>
    <script type="module" src="/src/web/main.ts"></script>
  </body>
</html>
